<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test API SIDAII - Registro</title>
<style>
body { font-family: system-ui, -apple-system, sans-serif; max-width: 700px; margin: 30px auto; padding: 0 20px; background: #f5f5f5; }
h1 { color: #1e3a5f; text-align: center; }
.card { background: #fff; border-radius: 8px; padding: 25px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.card h2 { margin: 0 0 15px; font-size: 1.1rem; color: #1e3a5f; border-bottom: 1px solid #eee; padding-bottom: 10px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid .full { grid-column: 1 / -1; }
label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; color: #333; }
input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; box-sizing: border-box; }
textarea { resize: vertical; }
button { background: linear-gradient(135deg, #1e3a5f, #2d5a87); color: #fff; border: none; padding: 12px 30px; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; }
button:hover { opacity: 0.9; }
button:disabled { opacity: 0.6; cursor: not-allowed; }
#result { margin-top: 15px; padding: 15px; border-radius: 4px; display: none; white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; }
#result.success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; display: block; }
#result.error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; display: block; }
.spinner { display: none; text-align: center; margin: 15px 0; }
.spinner.active { display: block; }
.spinner::after { content: ''; display: inline-block; width: 24px; height: 24px; border: 3px solid #ddd; border-top-color: #1e3a5f; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.file-row { display: flex; gap: 10px; align-items: center; }
.file-row input { flex: 1; }
.file-status { font-size: 0.75rem; min-width: 60px; }
.ok { color: #28a745; }
</style>
</head>
<body>

<h1>🧪 Test API SIDAII</h1>

<div class="card">
  <h2>1. Health Check</h2>
  <button onclick="healthCheck()">Probar Health Check</button>
  <div id="healthResult" style="margin-top:10px;font-family:monospace;font-size:0.85rem;"></div>
</div>

<div class="card">
  <h2>2. Verificar Cédula</h2>
  <div class="form-grid">
    <div class="full">
      <label>Cédula</label>
      <input type="text" id="checkCedula" value="99999994" placeholder="Ingrese cédula">
    </div>
  </div>
  <button onclick="verificarCedula()" style="margin-top:10px;">Verificar</button>
  <div id="checkResult" style="margin-top:10px;font-family:monospace;font-size:0.85rem;"></div>
</div>

<div class="card" id="sectionDiscapacidades" style="display:none">
  <h2>Cargando discapacidades...</h2>
  <div class="spinner active"></div>
</div>

<div class="card">
  <h2>3. Registrar Beneficiario</h2>
  <form id="regForm" onsubmit="return registrar(event)">
    <div class="form-grid">
      <div>
        <label>Cédula *</label>
        <input type="text" name="cedula" value="99999993" required>
      </div>
      <div>
        <label>Nacionalidad</label>
        <select name="nacionalidad"><option value="V">V</option><option value="E">E</option></select>
      </div>
      <div>
        <label>Nombre *</label>
        <input type="text" name="nombre" value="Test" required>
      </div>
      <div>
        <label>Apellido *</label>
        <input type="text" name="apellido" value="HTML" required>
      </div>
      <div>
        <label>Fecha Nac. *</label>
        <input type="date" name="fecha_naci" value="1990-06-15" required>
      </div>
      <div>
        <label>Sexo *</label>
        <select name="sexo" required><option value="M">Masculino</option><option value="F">Femenino</option></select>
      </div>
      <div>
        <label>Email</label>
        <input type="email" name="email" value="test@example.com">
      </div>
      <div>
        <label>Teléfono</label>
        <input type="text" name="telefono" value="04121234567">
      </div>
      <div>
        <label>Estado Civil</label>
        <input type="text" name="edo_civil" value="Soltero">
      </div>
      <div>
        <label>Hijos</label>
        <input type="number" name="nro_hijo" value="0">
      </div>
      <div>
        <label>Estado *</label>
        <input type="text" name="estado" value="Miranda" required>
      </div>
      <div>
        <label>Municipio *</label>
        <input type="text" name="municipio" value="Baruta" required>
      </div>
      <div>
        <label>Parroquia *</label>
        <input type="text" name="parroquia" value="El Cafetal" required>
      </div>
      <div>
        <label>Discapacidad *</label>
        <select name="discapacidad" id="discapacidadSelect" required>
          <option value="">Cargando...</option>
        </select>
      </div>
      <div>
        <label>Certificado</label>
        <input type="text" name="certificado" value="">
      </div>
      <div>
        <label>Protección Social</label>
        <input type="text" name="proteccion_social" value="No">
      </div>
      <div class="full">
        <label>Dirección</label>
        <textarea name="direccion" rows="2">Calle Principal, Casa 1</textarea>
      </div>
      <div class="full">
        <label>Documentos (opcional en test)</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><label style="font-weight:400">Copia Cédula</label><input type="file" name="doc_cedula" accept=".pdf,.jpg,.jpeg,.png"></div>
          <div><label style="font-weight:400">Informe Médico</label><input type="file" name="doc_informe" accept=".pdf,.jpg,.jpeg,.png"></div>
          <div><label style="font-weight:400">Foto</label><input type="file" name="doc_foto" accept=".pdf,.jpg,.jpeg,.png"></div>
          <div><label style="font-weight:400">Solicitud</label><input type="file" name="doc_solicitud" accept=".pdf,.jpg,.jpeg,.png"></div>
        </div>
      </div>
    </div>
    <button type="submit" style="margin-top:15px;">Registrar</button>
  </form>
  <div class="spinner" id="spinner"></div>
  <div id="result"></div>
</div>

<div class="card">
  <h2>4. Verificar Atención (Operación Estadal)</h2>
  <div class="form-grid">
    <div class="full">
      <label>Cédula</label>
      <input type="text" id="checkAtencionCedula" value="99999993" placeholder="Ingrese cédula registrada">
    </div>
  </div>
  <button onclick="verificarAtencion()" style="margin-top:10px;">Verificar Atención</button>
  <div id="atencionResult" style="margin-top:10px;font-family:monospace;font-size:0.85rem;"></div>
</div>

<script>
const API_URL = 'http://localhost/sidaii/php/api_conapdis.php';
const API_KEY = 'sk_sidaii_local_dev_2026';

async function apiCall(action, body, method = 'POST') {
  const opts = {
    method,
    headers: { 'X-API-Key': API_KEY },
  };
  if (method === 'POST') {
    opts.body = body;
    if (!(body instanceof FormData)) {
      opts.headers['Content-Type'] = 'application/json';
    }
  }
  const url = method === 'GET' ? `${API_URL}?action=${action}&${new URLSearchParams(body)}` : `${API_URL}?action=${action}`;
  const res = await fetch(url, opts);
  return res.json();
}

async function healthCheck() {
  const el = document.getElementById('healthResult');
  el.textContent = 'Consultando...';
  try {
    const r = await apiCall('health', {}, 'GET');
    el.innerHTML = `<pre style="margin:0">${JSON.stringify(r, null, 2)}</pre>`;
  } catch (e) { el.textContent = 'Error: ' + e.message; }
}

async function verificarCedula() {
  const el = document.getElementById('checkResult');
  const cedula = document.getElementById('checkCedula').value;
  el.textContent = 'Consultando...';
  try {
    const r = await apiCall('verificar-cedula', { cedula }, 'GET');
    el.innerHTML = `<pre style="margin:0">${JSON.stringify(r, null, 2)}</pre>`;
  } catch (e) { el.textContent = 'Error: ' + e.message; }
}

async function loadDiscapacidades() {
  const sel = document.getElementById('discapacidadSelect');
  const card = document.getElementById('sectionDiscapacidades');
  try {
    const r = await apiCall('discapacidades', {}, 'GET');
    if (r.success && r.data) {
      sel.innerHTML = '<option value="">Seleccione...</option>';
      for (const d of r.data) {
        const opt = document.createElement('option');
        opt.value = d.nombre_e;
        opt.textContent = d.nombre_e;
        sel.appendChild(opt);
      }
    }
  } catch (e) {
    sel.innerHTML = '<option value="">Error al cargar</option>';
  } finally {
    card.style.display = 'none';
  }
}

async function verificarAtencion() {
  const el = document.getElementById('atencionResult');
  const cedula = document.getElementById('checkAtencionCedula').value;
  el.textContent = 'Consultando...';
  try {
    const r = await apiCall('verificar-atencion', { cedula }, 'GET');
    if (r.success && r.existe) {
      let html = '<strong>Registros encontrados:</strong>\n\n';
      for (const row of r.data) {
        html += `N° Atención: ${row.numero_aten}\n`;
        html += `Cédula: ${row.cedula}\n`;
        html += `Fecha: ${row.fecha_creada}\n`;
        html += `Solicitud: ${row.atencion_solicitada || 'N/A'}\n`;
        html += `Status: ${row.statu || 'Pendiente'}\n`;
        html += `Asignado a: ${row.asignado_nombre}\n`;
        html += `Gerencia: ${row.gerencia || 'N/A'}\n`;
        html += `Coordinación: ${row.nombre_coordinacion}\n`;
        html += `----------------------------------------\n`;
      }
      el.innerHTML = `<pre style="margin:0">${html}</pre>`;
    } else {
      el.innerHTML = `<pre style="margin:0;color:#856404">${r.message || 'No se encontraron atenciones'}</pre>`;
    }
  } catch (e) { el.textContent = 'Error: ' + e.message; }
}

async function registrar(event) {
  event.preventDefault();
  const form = document.getElementById('regForm');
  const fd = new FormData(form);
  const data = {};
  for (const [k, v] of fd) { data[k] = v; }

  const resultEl = document.getElementById('result');
  const spinner = document.getElementById('spinner');
  resultEl.className = '';
  resultEl.style.display = 'none';
  spinner.classList.add('active');

  try {
    const filePromises = [];
    const fileFields = ['doc_cedula', 'doc_informe', 'doc_foto', 'doc_solicitud'];
    for (const field of fileFields) {
      const input = form.querySelector(`[name="${field}"]`);
      if (input && input.files && input.files[0]) {
        filePromises.push(
          new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => {
              const base64 = reader.result.split(',')[1];
              resolve({ field, nombre: input.files[0].name, contenido: base64 });
            };
            reader.readAsDataURL(input.files[0]);
          })
        );
      }
    }
    const fileResults = await Promise.all(filePromises);
    if (fileResults.length > 0) {
      const docs = {};
      for (const fr of fileResults) {
        docs[fr.field] = { nombre: fr.nombre, contenido: fr.contenido };
      }
      data.documentos = docs;
    }

    const r = await apiCall('registrar', JSON.stringify(data));
    if (r.success) {
      resultEl.className = 'success';
      resultEl.textContent = 'REGISTRO EXITOSO\nCédula: ' + r.data.cedula;
    } else {
      resultEl.className = 'error';
      resultEl.textContent = 'ERROR: ' + (r.message || 'Desconocido');
    }
  } catch (e) {
    resultEl.className = 'error';
    resultEl.textContent = 'Error de red: ' + e.message;
  } finally {
    spinner.classList.remove('active');
  }
}

document.addEventListener('DOMContentLoaded', loadDiscapacidades);
</script>
</body>
</html>
